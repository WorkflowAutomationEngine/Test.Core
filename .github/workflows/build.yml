name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build

    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show repository structure
        run: |
          pwd
          ls -la
          ls -la NuGet

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore *.slnx

      - name: Build
        run: dotnet build *.slnx --configuration Release --no-restore

      - name: Show MSBuild VersionPrefix
        run: |
          dotnet msbuild Test.Core.csproj -getProperty:VersionPrefix

      - name: Test
        run: dotnet test *.slnx --configuration Release --no-build --verbosity normal

      - name: Pack
        run: |
            dotnet pack Test.Core.csproj \
            --configuration Release \
            --no-build \
            --output ./artifacts

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: Test.Core.Package
          path: ./artifacts/*.nupkg

      - name: Configure GitHub Packages
        run: |
  
          dotnet nuget remove source github || true

          dotnet nuget add source \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/WorkflowAutomationEngine/index.json"

      - name: Push Package
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --source github \
            --skip-duplicate